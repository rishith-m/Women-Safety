services:
  - type: web
    name: women-safety-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: MONGO_URL
        sync: false  # You'll set this manually in the Render dashboard
      - key: PYTHON_VERSION
        value: "3.11.0"
